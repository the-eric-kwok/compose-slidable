name: ComposeSlidableDemo

options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "14.0"
  createIntermediateGroups: true

targets:
  ComposeSlidableDemo:
    type: application
    platform: iOS
    sources:
      - iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.erickwok.composeslidable.demo.ios
        PRODUCT_NAME: ComposeSlidableDemo
        SWIFT_VERSION: 5.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CADisableMinimumFrameDurationOnPhone: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SUPPORTS_MACCATALYST: NO
    scheme:
      testTargets: []
